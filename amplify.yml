version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - 'env | grep -E "NEXT_PUBLIC_|DATABASE_URL|CLERK_SECRET_KEY|OPENAI_API_KEY" >> .env.production || true'
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
