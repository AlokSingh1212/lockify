version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - # Safely inject variables without using risky grep exit codes
        - printenv | while read line; do if [[ $line == NEXT_PUBLIC_* ]] || [[ $line == DATABASE_URL* ]] || [[ $line == CLERK_SECRET_KEY* ]] || [[ $line == OPENAI_API_KEY* ]]; then echo "$line" >> .env.production; fi; done
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
